name: News Collector (뉴스 수집)

on:
  schedule:
    # KST 07:00~23:00 = UTC 22:00~14:00 (평일)
    - cron: '*/5 22-23,0-14 * * 0-4'
    - cron: '*/5 0-14 * * 5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: data/
          key: data-${{ github.run_id }}
          restore-keys: data-

      - uses: actions/cache@v4
        with:
          path: .cache/
          key: finbert-model-v1
          restore-keys: finbert-model-

      - run: npm ci
      - run: node src/check-news.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
