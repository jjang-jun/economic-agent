name: News Collector Backup (뉴스 수집 백업)

on:
  schedule:
    # 메인 5분 수집은 Agent Server/Scheduler가 담당한다.
    # GitHub Actions는 schedule 지연/누락 가능성이 있어 15분 백업 수집기로만 사용한다.
    # KST 07:00~23:00 = UTC 22:00~14:00 (평일 경계 보정)
    - cron: '11,26,41,56 22-23 * * 0-4'
    - cron: '11,26,41,56 0-14 * * 1-5'
  workflow_dispatch:

concurrency:
  group: economic-agent-news-alert-backup
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ github.run_id }}
          restore-keys: data-

      - uses: actions/cache@v5
        with:
          path: .cache/
          key: finbert-model-v1
          restore-keys: finbert-model-

      - run: npm ci
      - run: npm run collect:news
        env:
          COLLECTOR_TRIGGER_SOURCE: github_actions_backup
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
