name: Stock Report (장 마감 분석)

on:
  schedule:
    # KST 16:00 = UTC 07:00 (월~금)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  stock-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ github.run_id }}
          restore-keys: data-

      - uses: actions/cache@v5
        with:
          path: .cache/
          key: finbert-model-v1
          restore-keys: finbert-model-

      - run: npm ci
      - run: node src/stock-report.js
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PORTFOLIO_JSON_BASE64: ${{ secrets.PORTFOLIO_JSON_BASE64 }}
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
