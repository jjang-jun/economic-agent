name: Telegram 승인 흐름 점검

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    # 08:10 KST, before regular market routines.
    - cron: '10 23 * * 0-4'

concurrency:
  group: economic-agent-telegram-smoke-actions
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Smoke pending action flow
        run: npm run telegram:smoke-actions
        env:
          TELEGRAM_SECRET_CHAT_ID: ${{ secrets.TELEGRAM_SECRET_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SECRET_CHAT_ID }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Notify private chat on failure
        if: failure()
        run: npm run notify:workflow-failure -- "Telegram 승인 흐름 점검" "Smoke pending action flow"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SECRET_CHAT_ID: ${{ secrets.TELEGRAM_SECRET_CHAT_ID }}
          TELEGRAM_PRIVATE_CHAT_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
